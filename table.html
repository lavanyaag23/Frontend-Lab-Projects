<html>
<head>
    <title>HTML Table</title>

    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding-top: 10px;
            padding-bottom: 20px;
            padding-left: 30px;
            padding-right: 40px;
            border: 1px solid black;
        }

        th {
            background-color: green;
            color: white;
        }
    </style>
</head>

<body>

<table>

    <tr>
        <th>Roll No</th>
        <th>Name</th>
        <th>Course</th>
    </tr>

    <tr align="center">
        <td>1</td>
        <td>Lavanya</td>
        <td>B.Tech</td>
    </tr>

    <tr align="center" style="background-color: lavender;">
        <td>2</td>
        <td>Khushi</td>
        <td>B.Tech</td>
    </tr>

    <tr>
        <th colspan="2">Name</th>
        <th>Age</th>
    </tr>

    <tr>
        <td>Jill</td>
        <td>Smith</td>
        <td>43</td>
    </tr>

    <tr>
        <td>Eve</td>
        <td>Jackson</td>
        <td>57</td>
    </tr>

    <tr>
        <th rowspan="2">Phone</th>
        <td colspan="2">555-1234</td>
    </tr>

    <tr>
        <td colspan="2">555-8745</td>
    </tr>

</table>

</body>
</html>
