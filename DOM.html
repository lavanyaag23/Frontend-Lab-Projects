<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> DOM & Event Handling Demo </title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f0f2f5;
        margin: 0;
        padding: 0;
        transition: background-color 0.5s, color 0.5s;
    }

    .container {
        width: 70%;
        margin: 60px auto;
        padding: 30px;
        background: white;
        border-radius: 12px;
        box-shadow: 0px 6px 20px rgba(0,0,0,0.2);
        transition: 0.5s;
    }

    h1 {
        margin-bottom: 20px;
    }

    p {
        font-size: 18px;
        margin: 15px 0;
        transition: all 0.3s ease;
    }

    button {
        padding: 10px 15px;
        margin: 8px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        background-color: #4CAF50;
        color: white;
        transition: 0.3s;
    }

    .button-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
    }

    .button-group button {
    width: 150px;
    }

    button:hover {
        background-color: #45a049;
        transform: scale(1.05);
    }

    .dark-mode {
        background-color: #1e1e1e;
        color: white;
        font-size: 19px;
    }

    .dark-mode .container {
        background-color: #333;
    }

</style>
</head>

<body>

<div class="container">

    <h1 id="mainHeading"> Lavanya's Advanced DOM Interaction</h1>

    <select id="themeSelect">
    <option value="">Select Theme</option>
    <option value="light">Light</option>
    <option value="dark">Dark</option>
    </select>

    <p id="para1">This is the first paragraph. It will change dynamically.</p>
    <p id="para2">This is the second paragraph. You can style it.</p>
    <p id="dateTime"></p>
     
    <div class="input-section">
       <input type="text" id="userInput" placeholder="Enter new paragraph text">
       <button id="updateFromInput">Update Text</button>
    </div>

    <p>Button Click Count: <span id="counter">0</span></p>
    <button id="countBtn">Click Me</button>

    <div class="image-section">
    <img id="demoImage" src="https://www.xcitium.com/blog/wp-content/uploads/2025/10/what-is-a-dom.png" alt="DOM Image" width="300px" height="200px">
    <br>
    <button id="changeImage">Change Image</button>
    </div>

    <div class="button-group">
        <button id="changeTextBtn">Change Text</button>
        <button id="changeColorBtn">Change Color</button>
        <button id="increaseSizeBtn">Increase Size</button>

        <button id="addBorderBtn">Add Border</button>
        <button id="bgBtn">Random Background</button>
        <button id="darkModeBtn">Dark Mode</button>

        <button id="resetBtn">Reset</button>
    </div>

</div>

<script>

    const para1 = document.getElementById("para1");
    const para2 = document.getElementById("para2");
    const body = document.body;
    const heading = document.getElementById("mainHeading");

    let textSize = 20;
    let count = 0;

    document.getElementById("countBtn").addEventListener("click", function() {
    count++;
    document.getElementById("counter").textContent = count;
    });

    document.getElementById("updateFromInput").addEventListener("click", function() {
    const inputValue = document.getElementById("userInput").value;
    para1.textContent = inputValue;
    });

    document.getElementById("changeTextBtn").addEventListener("click", function() {
        para1.textContent = "The first paragraph text has been changed using DOM manipulation!";
        para2.textContent = "The second paragraph text has  been changed by Lavanya!";
    });

    document.getElementById("changeColorBtn").addEventListener("click", function() {
        para1.style.color = "purple";
        para2.style.color = "red";
    });

    document.getElementById("increaseSizeBtn").addEventListener("click", function() {
        textSize += 2;
        para1.style.fontSize = textSize + "px";
        para2.style.fontSize = textSize + "px";
    });

    document.getElementById("addBorderBtn").addEventListener("click", function() {
        para1.style.border = "2px solid green";
        para1.style.padding = "10px";
        para2.style.border = "2px solid green";
        para2.style.padding = "10px";
    });

    document.getElementById("bgBtn").addEventListener("click", function() {
        const randomColor = "#" + Math.floor(Math.random()*16777215).toString(16);
        body.style.backgroundColor = randomColor;
    });

    document.getElementById("darkModeBtn").addEventListener("click", function() {
        body.classList.toggle("dark-mode");
    });
